<!DOCTYPE html>
<html>
  <head>
    <title>Proyecto AR Plantas</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.rawgit.com/jeromeetienne/AR.js/2.2.1/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin:0; overflow:hidden;">
    <a-scene embedded arjs>

      <!-- Ficha 1: Sano -->
      <a-marker type="pattern" url="markers/pattern-Eucalypto_baby_blue_Vigilancia.patt">
        <a-image src="fichas/sano.png" position="0 0.5 0" scale="2 2 2"></a-image>
      </a-marker>

      <!-- Ficha 2: Vigilar -->
      <a-marker type="pattern" url="markers/pattern-Ruscus_planta_en_estado_optimo.patt">
        <a-image src="fichas/vigilar.png" position="0 0.5 0" scale="2 2 2"></a-image>
      </a-marker>

      <!-- Ficha 3: Actuar ya -->
      <a-marker type="pattern" url="markers/pattern-Estado_actuar_ya_Liriope.patt">
        <a-image src="fichas/actuar.png" position="0 0.5 0" scale="2 2 2"></a-image>
      </a-marker>

      <!-- Ficha 4: Cuarentena -->
      <a-marker type="pattern" url="markers/pattern-Pasar a curentena.patt">
        <a-image src="fichas/cuarentena.png" position="0 0.5 0" scale="2 2 2"></a-image>
      </a-marker>

      <!-- Cámara -->
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
