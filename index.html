<!DOCTYPE html>
<html>
<head>
    <title>Alerta Verde - RA Fitosanitaria</title>
    <!-- Versiones 100% compatibles para evitar el error de dispatchEvent -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;">

        <!-- PRECARGA DE ACTIVOS: Crucial para evitar errores de textura -->
        <a-assets>
            <img id="ficha-sano" src="fichas/sano.png">
            <img id="ficha-vigilar" src="fichas/vigilar.png">
            <img id="ficha-actuar" src="fichas/actuar.png">
            <img id="ficha-cuarentena" src="fichas/cuarentena.png">
        </a-assets>

        <!-- Marcador 1: SANO (Ruscus optimo) -->
        <a-marker type="pattern" url="markers/pattern-Ruscus_plantas_en_estado_optimo.patt">
            <a-image src="#ficha-sano" position="0 0.5 0" rotation="-90 0 0" scale="2.5 2.5 2.5"></a-image>
        </a-marker>

        <!-- Marcador 2: VIGILAR (Eucalipto Baby Blue) -->
        <a-marker type="pattern" url="markers/pattern-Eucalypto_baby_blue_Vigilancia.patt">
            <a-image src="#ficha-vigilar" position="0 0.5 0" rotation="-90 0 0" scale="2.5 2.5 2.5"></a-image>
        </a-marker>

        <!-- Marcador 3: ACTUAR YA (Liriope) -->
        <a-marker type="pattern" url="markers/pattern-Estado_actuar_ya_Liriope.patt">
            <a-image src="#ficha-actuar" position="0 0.5 0" rotation="-90 0 0" scale="2.5 2.5 2.5"></a-image>
        </a-marker>

        <!-- Marcador 4: CUARENTENA (Pasar a curentena) -->
        <a-marker type="pattern" url="markers/pattern-Pasar a curentena.patt">
            <a-image src="#ficha-cuarentena" position="0 0.5 0" rotation="-90 0 0" scale="2.5 2.5 2.5"></a-image>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
