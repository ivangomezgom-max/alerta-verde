<!DOCTYPE html>
<html>
<head>
    <title>Alerta Verde - RA</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">
    <!-- Configuración optimizada para evitar el botón VR y mejorar la detección -->
    <a-scene embedded 
             arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;" 
             vr-mode-ui="enabled: false">

        <a-assets>
            <img id="ficha-sano" src="Proyecto_AR/fichas/sano.png">
            <img id="ficha-vigilar" src="Proyecto_AR/fichas/vigilar.png">
            <img id="ficha-actuar" src="Proyecto_AR/fichas/actuar.png">
            <img id="ficha-cuarentena" src="Proyecto_AR/fichas/cuarentena.png">
        </a-assets>

        <!-- SANO - Desplazada a la derecha (1.5) y escala moderada (1.8) -->
        <a-marker type="pattern" url="Proyecto_AR/markers/pattern-Ruscus_planta_en_estado_optimo.patt">
            <a-image src="#ficha-sano" position="1.5 0 0" rotation="-90 0 0" scale="1.8 1.8 1.8"></a-image>
        </a-marker>

        <!-- VIGILAR -->
        <a-marker type="pattern" url="Proyecto_AR/markers/pattern-Eucalypto_baby_blue_Vigilancia.patt">
            <a-image src="#ficha-vigilar" position="1.5 0 0" rotation="-90 0 0" scale="1.8 1.8 1.8"></a-image>
        </a-marker>

        <!-- ACTUAR -->
        <a-marker type="pattern" url="Proyecto_AR/markers/pattern-Estado_actuar_ya_Liriope.patt">
            <a-image src="#ficha-actuar" position="1.5 0 0" rotation="-90 0 0" scale="1.8 1.8 1.8"></a-image>
        </a-marker>

        <!-- CUARENTENA -->
        <a-marker type="pattern" url="Proyecto_AR/markers/pattern-Pasar_a_curentena.patt">
            <a-image src="#ficha-cuarentena" position="1.5 0 0" rotation="-90 0 0" scale="1.8 1.8 1.8"></a-image>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
