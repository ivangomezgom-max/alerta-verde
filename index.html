<!DOCTYPE html>
<html>
<head>
    <title>Alerta Verde - RA Profesional</title>
    <meta charset="UTF-8">
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">
    <a-scene embedded 
             arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono; patternRatio: 0.75; smooth: true; smoothCount: 10; smoothTolerance: 0.01; smoothThreshold: 5;" 
             vr-mode-ui="enabled: false">

        <a-assets>
            <img id="ficha-sano" src="Proyecto_AR/fichas/sano.png">
            <img id="ficha-vigilar" src="Proyecto_AR/fichas/vigilar.png">
            <img id="ficha-actuar" src="Proyecto_AR/fichas/actuar.png">
            <img id="ficha-cuarentena" src="Proyecto_AR/fichas/cuarentena.png">
        </a-assets>

        <a-marker type="pattern" url="Proyecto_AR/markers/pattern-Ruscus_planta_en_estado_optimo.patt">
            <a-image src="#ficha-sano" position="0 0.5 0" rotation="-90 0 0" scale="1 1 1" 
                     material="transparent: true; opacity: 0.9"
                     class="clickable"
                     animation__mouseenter="property: scale; to: 1.2 1.2 1.2; dur: 300; startEvents: mouseenter"
                     animation__mouseleave="property: scale; to: 1 1 1; dur: 300; startEvents: mouseleave">
            </a-image>
        </a-marker>

        <a-marker type="pattern" url="Proyecto_AR/markers/pattern-Eucalypto_baby_blue_Vigilancia.patt">
            <a-image src="#ficha-vigilar" position="0 0.5 0" rotation="-90 0 0" scale="1 1 1" 
                     material="transparent: true; opacity: 0.9"
                     class="clickable"
                     animation__mouseenter="property: scale; to: 1.2 1.2 1.2; dur: 300; startEvents: mouseenter"
                     animation__mouseleave="property: scale; to: 1 1 1; dur: 300; startEvents: mouseleave">
            </a-image>
        </a-marker>

        <a-marker type="pattern" url="Proyecto_AR/markers/pattern-Estado_actuar_ya_Liriope.patt">
            <a-image src="#ficha-actuar" position="0 0.5 0" rotation="-90 0 0" scale="1 1 1" 
                     material="transparent: true; opacity: 0.9"
                     class="clickable"
                     animation__mouseenter="property: scale; to: 1.2 1.2 1.2; dur: 300; startEvents: mouseenter"
                     animation__mouseleave="property: scale; to: 1 1 1; dur: 300; startEvents: mouseleave">
            </a-image>
        </a-marker>

        <a-marker type="pattern" url="Proyecto_AR/markers/pattern-Mal_estado.patt">
            <a-image src="#ficha-cuarentena" position="0 0.5 0" rotation="-90 0 0" scale="1 1 1" 
                     material="transparent: true; opacity: 0.9"
                     class="clickable"
                     animation__mouseenter="property: scale; to: 1.2 1.2 1.2; dur: 300; startEvents: mouseenter"
                     animation__mouseleave="property: scale; to: 1 1 1; dur: 300; startEvents: mouseleave">
            </a-image>
        </a-marker>

        <a-entity camera>
            <a-cursor fuse="true" fuse-timeout="1500"
                      position="0 0 -1"
                      geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
                      material="color: #00FF00; shader: flat"
                      raycaster="objects: .clickable">
            </a-cursor>
        </a-entity>

    </a-scene>
</body>
</html>
