<!DOCTYPE html>
<html>
<head>
    <title>Proyecto AR Plantas - Alerta Verde</title>
    <!-- Librerías de A-Frame y AR.js -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.rawgit.com/jeromeetienne/AR.js/2.2.1/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin:0; overflow:hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">

        <!-- 1. SECCIÓN DE ACTIVOS: Precarga de imágenes para evitar errores de textura -->
        <a-assets>
            <img id="ficha-sano" src="fichas/sano.png">
            <img id="ficha-vigilar" src="fichas/vigilar.png">
            <img id="ficha-actuar" src="fichas/actuar.png">
            <img id="ficha-cuarentena" src="fichas/cuarentena.png">
        </a-assets>

        <!-- Ficha 1: Sano (Ruscus) -->
        <a-marker type="pattern" url="markers/pattern-Ruscus_plantas_en_estado_optimo.patt">
            <a-image src="#ficha-sano" position="0 0.5 0" rotation="-90 0 0" scale="2 2 2"></a-image>
        </a-marker>

        <!-- Ficha 2: Vigilar (Eucalipto Baby Blue) -->
        <a-marker type="pattern" url="markers/pattern-Eucalypto_baby_blue_Vigilancia.patt">
            <a-image src="#ficha-vigilar" position="0 0.5 0" rotation="-90 0 0" scale="2 2 2"></a-image>
        </a-marker>

        <!-- Ficha 3: Actuar ya (Liriope) -->
        <a-marker type="pattern" url="markers/pattern-Estado_actuar_ya_Liriope.patt">
            <a-image src="#ficha-actuar" position="0 0.5 0" rotation="-90 0 0" scale="2 2 2"></a-image>
        </a-marker>

        <!-- Ficha 4: Cuarentena (CORREGIDO: Coincide exactamente con tu archivo) -->
        <a-marker type="pattern" url="markers/pattern-Pasar a curentena.patt">
            <a-image src="#ficha-cuarentena" position="0 0.5 0" rotation="-90 0 0" scale="2 2 2"></a-image>
        </a-marker>

        <!-- Cámara del sistema AR -->
        <a-entity camera></a-entity>

    </a-scene>
</body>
</html>
