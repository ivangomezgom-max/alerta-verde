<!DOCTYPE html>
<html>
<head>
    <title>Alerta Verde - RA</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">

        <a-assets>
            <img id="ficha-sano" src="./fichas/sano.png">
            <img id="ficha-vigilar" src="./fichas/vigilar.png">
            <img id="ficha-actuar" src="./fichas/actuar.png">
            <img id="ficha-cuarentena" src="./fichas/cuarentena.png">
        </a-assets>

        <!-- 1. SANO (Uso de ./ para forzar carpeta local) -->
        <a-marker type="pattern" url="./markers/pattern-Ruscus_planta_en_estado_optimo.patt">
            <a-image src="#ficha-sano" position="0 0.5 0" rotation="-90 0 0" scale="2.5 2.5 2.5"></a-image>
        </a-marker>

        <!-- 2. VIGILAR -->
        <a-marker type="pattern" url="./markers/pattern-Eucalypto_baby_blue_Vigilancia.patt">
            <a-image src="#ficha-vigilar" position="0 0.5 0" rotation="-90 0 0" scale="2.5 2.5 2.5"></a-image>
        </a-marker>

        <!-- 3. ACTUAR -->
        <a-marker type="pattern" url="./markers/pattern-Estado_actuar_ya_Liriope.patt">
            <a-image src="#ficha-actuar" position="0 0.5 0" rotation="-90 0 0" scale="2.5 2.5 2.5"></a-image>
        </a-marker>

        <!-- 4. CUARENTENA (Nombre exacto: pattern-Pasar a curentena.patt) -->
        <a-marker type="pattern" url="./markers/pattern-Pasar a curentena.patt">
            <a-image src="#ficha-cuarentena" position="0 0.5 0" rotation="-90 0 0" scale="2.5 2.5 2.5"></a-image>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
