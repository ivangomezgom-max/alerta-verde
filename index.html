<!DOCTYPE html>
<html>
<head>
    <title>Alerta Verde - RA Sofisticada</title>
    <meta charset="UTF-8">
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <script>
        // COMPONENTE NOVEDOSO: APARECER, ESPERAR Y DIFUMINAR
        AFRAME.registerComponent('ficha-temporal', {
            init: function () {
                var el = this.el;
                // Inicialmente invisible y pequeña
                el.setAttribute('material', 'opacity', 0);
                el.setAttribute('scale', '0.1 0.1 0.1');

                this.el.parentElement.addEventListener('markerFound', () => {
                    // Al encontrar el marcador: Aparece con estilo
                    el.setAttribute('animation', {
                        property: 'material.opacity',
                        to: 0.9,
                        dur: 1000
                    });
                    el.setAttribute('animation__scale', {
                        property: 'scale',
                        to: '1.5 1.5 1.5',
                        dur: 800
                    });

                    // Auto-difuminado tras 8 segundos
                    setTimeout(() => {
                        el.setAttribute('animation__fade', {
                            property: 'material.opacity',
                            to: 0,
                            dur: 2000
                        });
                        el.setAttribute('animation__scaleback', {
                            property: 'scale',
                            to: '0.1 0.1 0.1',
                            dur: 2000
                        });
                    }, 8000); 
                });
            }
        });
    </script>
</head>

<body style="margin: 0; overflow: hidden;">
    <a-scene embedded 
             arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono; patternRatio: 0.75; smooth: true; smoothCount: 10;" 
             vr-mode-ui="enabled: false">

        <a-assets>
            <img id="ficha-sano" src="Proyecto_AR/fichas/sano.png">
            <img id="ficha-vigilar" src="Proyecto_AR/fichas/vigilar.png">
            <img id="ficha-actuar" src="Proyecto_AR/fichas/actuar.png">
            <img id="ficha-cuarentena" src="Proyecto_AR/fichas/cuarentena.png">
        </a-assets>

        <a-marker type="pattern" url="Proyecto_AR/markers/pattern-Ruscus_planta_en_estado_optimo.patt">
            <a-image src="#ficha-sano" position="0 0.5 0" rotation="-90 0 0" material="transparent: true;" ficha-temporal></a-image>
        </a-marker>

        <a-marker type="pattern" url="Proyecto_AR/markers/pattern-Eucalypto_baby_blue_Vigilancia.patt">
            <a-image src="#ficha-vigilar" position="0 0.5 0" rotation="-90 0 0" material="transparent: true;" ficha-temporal></a-image>
        </a-marker>

        <a-marker type="pattern" url="Proyecto_AR/markers/pattern-Estado_actuar_ya_Liriope.patt">
            <a-image src="#ficha-actuar" position="0 0.5 0" rotation="-90 0 0" material="transparent: true;" ficha-temporal></a-image>
        </a-marker>

        <a-marker type="pattern" url="Proyecto_AR/markers/pattern-Mal_estado.patt">
            <a-image src="#ficha-cuarentena" position="0 0.5 0" rotation="-90 0 0" material="transparent: true;" ficha-temporal></a-image>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
