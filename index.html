<!DOCTYPE html>
<html>
<head>
    <title>Alerta Verde - RA</title>
    <meta charset="UTF-8">
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">
    <!-- Configuración técnica: se define patternRatio en 0.75 para los marcadores descargados -->
    <a-scene embedded 
             arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono; patternRatio: 0.75;" 
             vr-mode-ui="enabled: false">

        <a-assets>
            <img id="ficha-sano" src="Proyecto_AR/fichas/sano.png">
            <img id="ficha-vigilar" src="Proyecto_AR/fichas/vigilar.png">
            <img id="ficha-actuar" src="Proyecto_AR/fichas/actuar.png">
            <img id="ficha-cuarentena" src="Proyecto_AR/fichas/cuarentena.png">
        </a-assets>

        <!-- 1. SANO -->
        <a-marker type="pattern" url="Proyecto_AR/markers/pattern-Ruscus_planta_en_estado_optimo.patt">
            <a-image src="#ficha-sano" position="0 0.5 0" rotation="-90 0 0" scale="1.2 1.2 1.2"></a-image>
        </a-marker>

        <!-- 2. VIGILAR -->
        <a-marker type="pattern" url="Proyecto_AR/markers/pattern-Eucalypto_baby_blue_Vigilancia.patt">
            <a-image src="#ficha-vigilar" position="0 0.5 0" rotation="-90 0 0" scale="1.2 1.2 1.2"></a-image>
        </a-marker>

        <!-- 3. ACTUAR -->
        <a-marker type="pattern" url="Proyecto_AR/markers/pattern-Estado_actuar_ya_Liriope.patt">
            <a-image src="#ficha-actuar" position="0 0.5 0" rotation="-90 0 0" scale="1.2 1.2 1.2"></a-image>
        </a-marker>

        <!-- 4. CUARENTENA - Ruta verificada según tu última actualización de nombre -->
        <a-marker type="pattern" url="Proyecto_AR/markers/pattern-Eucalypto_baby_blue_Vigilancia.patt">
            <a-image src="#ficha-cuarentena" position="0 0.5 0" rotation="-90 0 0" scale="1.2 1.2 1.2"></a-image>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
